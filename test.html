```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #fff8f0, #ffe6f2);
        overflow: hidden;
    }

    .card {
        text-align: center;
        background: rgba(255,255,255,0.8);
        padding: 50px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        animation: pop 1s ease;
    }

    h1 {
        font-size: 55px;
        color: #ff5c8a;
        animation: glow 2s infinite alternate;
    }

    h2 {
        margin-top: 15px;
        color: #555;
        font-size: 25px;
        animation: slide 2s ease;
    }

    p {
        margin-top: 20px;
        color: #777;
        font-size: 18px;
    }

    .cake {
        font-size: 70px;
        margin: 20px;
        animation: bounce 1.5s infinite;
    }

    .balloon {
        position: absolute;
        font-size: 45px;
        animation: float 6s infinite ease-in-out;
    }

    .b1 { left: 10%; top: 20%; }
    .b2 { right: 15%; top: 15%; animation-delay: 1s; }
    .b3 { left: 20%; bottom: 15%; animation-delay: 2s; }
    .b4 { right: 10%; bottom: 20%; animation-delay: 3s; }


    @keyframes glow {
        from {
            text-shadow: 0 0 5px #ffb6c1;
        }
        to {
            text-shadow: 0 0 25px #ff5c8a;
        }
    }

    @keyframes slide {
        from {
            transform: translateY(50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    @keyframes pop {
        from {
            transform: scale(0.5);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    @keyframes bounce {
        0%,100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-20px);
        }
    }

    @keyframes float {
        0% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-50px);
        }
        100% {
            transform: translateY(0);
        }
    }

</style>

</head>

<body>

<div class="balloon b1">🎈</div>
<div class="balloon b2">🎈</div>
<div class="balloon b3">🎈</div>
<div class="balloon b4">🎈</div>


<div class="card">

    <div class="cake">🎂</div>

    <h1>Happy Birthday!</h1>

    <h2>Wishing You A Wonderful Day ✨</h2>

    <p>
        May your life be filled with happiness,<br>
        love, success and beautiful memories.
    </p>

</div>

</body>
</html>
```
